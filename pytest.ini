[pytest]
testpaths = backend/tests
markers =
    integration: butuh server backend hidup + MongoDB (lihat README); jalankan dengan `pytest -m integration`
; Default: hanya test bebas-infra (backend/tests/unit) — cocok untuk CI &
; mesin baru. Test lama berbasis live-server ditandai `integration` otomatis
; oleh backend/tests/conftest.py.
addopts = -m "not integration"
