# Auto-deploy ke VPS Hostinger setiap kali main berubah (merge PR), atau
# manual lewat tab Actions → "Deploy ke Hostinger VPS" → Run workflow.
#
# Butuh 3 secret repo (Settings → Secrets and variables → Actions):
#   VPS_HOST     — IP/hostname VPS
#   VPS_USER     — user SSH (mis. root)
#   VPS_SSH_KEY  — private key OpenSSH yang public key-nya ada di
#                  ~/.ssh/authorized_keys milik user tsb di VPS
# Opsional: VPS_PORT (default 22).
# Selama secret belum diset, job selesai dengan catatan (tidak gagal).
name: Deploy ke Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "::notice::Deploy dilewati — set secret VPS_HOST, VPS_USER, dan VPS_SSH_KEY di Settings → Secrets and variables → Actions untuk mengaktifkan auto-deploy."
            exit 0
          fi
          mkdir -p ~/.ssh
          # Buang CR (tempel dari Windows) + pastikan newline penutup
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Alternatif anti-salah-tempel: secret berisi SATU baris base64
          # (hasil `base64 -w0 ~/deploy_key`) — didekode di sini.
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            printf '%s' "$VPS_SSH_KEY" | tr -d ' \t\r\n' | base64 -d > ~/.ssh/deploy_key 2>/dev/null || true
            chmod 600 ~/.ssh/deploy_key
          fi
          # Validasi kunci SEBELUM konek — pesan jelas bila isi secret rusak
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::Isi secret VPS_SSH_KEY bukan private key OpenSSH yang valid. Cara paling mudah: di VPS jalankan  base64 -w0 ~/deploy_key; echo  lalu salin SATU baris hasilnya ke secret VPS_SSH_KEY. (Atau salin utuh semua baris file kunci dari -----BEGIN sampai -----END.)"
            exit 1
          fi
          # Uji jangkauan host lebih dulu — pesan jelas bila VPS_HOST salah
          if ! ssh-keyscan -T 10 -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "::error::Tidak bisa terhubung ke VPS di port ${VPS_PORT:-22}. Pastikan secret VPS_HOST HANYA berisi IP/hostname (contoh: 123.45.67.89 — tanpa http://, tanpa port, tanpa spasi) dan port SSH terbuka."
            exit 1
          fi
          ssh -i ~/.ssh/deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" 'bash -s' < scripts/deploy_vps.sh
